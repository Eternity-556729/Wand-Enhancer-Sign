name: Release

on:
  push:
    tags:
      - '*'
    branches:
      - main
      - master
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (optional, e.g., v1.0.9.2). Leave empty to auto-detect from CHANGELOG.'
        required: false

jobs:
  publish-release:
    if: github.repository == 'Hachig0r0/Wand-Enhancer-Sign'
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      RELEASE_VERSION: ''
      TAG_VERSION: ''

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from CHANGELOG
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            # Read CHANGELOG and extract the first version block formatted as ## [X.X.X.X]
            $content = Get-Content CHANGELOG.md -Raw
            if ($content -match '##\s+\[([0-9.]+)\]') {
              $version = $Matches[1]
            } else {
              Write-Error "Could not find a valid version matching ## [X.X.X.X] in CHANGELOG.md"
              exit 1
            }
          }
          
          # Strip 'v' prefix if present
          $cleanVersion = $version -replace '^v', ''
          
          # Securely save to GITHUB_ENV for Windows runners to prevent encoding issues
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_VERSION=$cleanVersion"
          Add-Content -Path $env:GITHUB_ENV -Value "TAG_VERSION=v$cleanVersion"
          
          Write-Host "Detected version: $cleanVersion"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      - name: Validate release metadata
        shell: pwsh
        run: ./scripts/validate-release-metadata.ps1 -ExpectedVersion $env:RELEASE_VERSION

      - name: Extract release notes from changelog
        shell: pwsh
        run: ./scripts/get-changelog-section.ps1 -Version $env:RELEASE_VERSION -OutputPath release-notes.md

      - name: Build release
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.TAG_VERSION }}
          tag_name: ${{ env.TAG_VERSION }}
          body_path: release-notes.md
          files: |
            CHANGELOG.md
            WandEnhancer/bin/Release/WandEnhancer.exe
          fail_on_unmatched_files: true
